name: Deploy on Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: self-hosted
    env:
      ADVISOR_OS_DIR: /Users/mohammedrezki/Desktop/advisor-os
    steps:
      - name: Deploy from live project directory
        run: |
          cd "$ADVISOR_OS_DIR"
          git pull origin main
          chmod +x ./deploy.sh
          ./deploy.sh
